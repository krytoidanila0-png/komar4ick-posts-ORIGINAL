<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Komar4ick posts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="matrix-bg" id="matrix"></div>

  <header>
    <h1>&gt; Komar4ick posts _</h1>
    <div style="display: flex; gap: 15px; align-items: center;">
      <button id="notifications-btn" class="bell-btn">🔔</button>
      <div id="auth-area"></div>
    </div>
  </header>

  <main>
    <section id="admin-panel" style="display: none;">
      <h2>&gt; Админ-панель</h2>
      <div class="admin-controls">
        <button id="show-bans-btn">📋 Список банов</button>
        <button id="show-mutes-btn">🔇 Список мутов</button>
      </div>
      <div id="admin-lists"></div>

      <!-- Поиск пользователя по email -->
      <div id="user-search-section" style="margin-top: 30px; border-top: 1px solid #0f0; padding-top: 20px;">
        <h3>🔍 Поиск пользователя по email</h3>
        <div style="display: flex; gap: 10px; margin: 15px 0;">
          <input type="email" id="search-email" placeholder="Email пользователя" style="flex: 1;">
          <button id="search-user-btn">Найти</button>
        </div>
        <div id="search-results" style="max-height: 200px; overflow-y: auto;"></div>
      </div>
    </section>

    <section id="add-post-section" style="display: none;">
      <h2>&gt; Новая запись</h2>
      <form id="add-post-form">
        <input type="text" id="post-title" placeholder="Заголовок" required>
        <textarea id="post-content" placeholder="Текст новости..." rows="4" required></textarea>
        <div class="media-url-area">
          <label for="media-url">🔗 Ссылка на фото или видео</label>
          <input type="url" id="media-url" placeholder="https://...">
          <div id="media-preview" class="media-preview"></div>
        </div>
        <button type="submit">Опубликовать</button>
      </form>
    </section>

    <section id="posts-section">
      <h2>&gt; Последние записи</h2>
      <div id="posts-container">Загрузка...</div>
    </section>
  </main>

  <!-- Модальное окно для оповещений -->
  <div id="notifications-modal" class="modal" style="display: none;">
    <div class="modal-content" style="width: 500px; max-width: 90%;">
      <span class="close-notifications-modal" style="float: right; font-size: 28px; cursor: pointer;">&times;</span>
      <h3>📢 Технические оповещения</h3>
      <div id="notifications-list" style="max-height: 400px; overflow-y: auto; margin: 15px 0;">Загрузка...</div>
      <div id="notifications-admin-form" style="display: none; border-top: 1px solid #0f0; padding-top: 15px;">
        <input type="text" id="notif-title" placeholder="Заголовок" style="width: 100%; margin-bottom: 10px;">
        <textarea id="notif-content" placeholder="Текст оповещения..." rows="2" style="width: 100%;"></textarea>
        <button id="create-notif-btn">➕ Опубликовать</button>
      </div>
    </div>
  </div>

  <!-- Модальное окно для управления пользователем (бан/мут/удаление) -->
  <div id="mod-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h3>Управление пользователем</h3>
      <p id="modal-user-info"></p>
      <div class="modal-actions">
        <button id="modal-ban-btn">🚫 Забанить</button>
        <button id="modal-mute-btn">🔇 Замутить</button>
        <button id="modal-delete-account-btn">🗑️ Удалить аккаунт (очистить данные)</button>
        <button id="modal-delete-comments-btn">🗑️ Удалить комментарии</button>
      </div>
      <div id="modal-ban-reason" style="display: none; margin-top: 10px;">
        <label>Причина бана (обязательно):</label>
        <input type="text" id="ban-reason" placeholder="Нарушение правил...">
        <button id="apply-ban-btn">Подтвердить бан</button>
      </div>
      <div id="modal-mute-duration" style="display: none;">
        <label>Длительность мута (минуты):</label>
        <input type="number" id="mute-duration" min="1" value="60">
        <button id="apply-mute-btn">Применить</button>
      </div>
    </div>
  </div>

  <div id="version-badge">v4.9.1 Beta</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC-sGE3Qn5owt3ONP7hP2fYwY3YVFgtPDA",
      authDomain: "brain-of-my-site.firebaseapp.com",
      projectId: "brain-of-my-site",
      storageBucket: "brain-of-my-site.firebasestorage.app",
      messagingSenderId: "460499128127",
      appId: "1:460499128127:web:cb4b3afbd902caecac0d8a",
      measurementId: "G-2GYGZVMX9H"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.auth = auth;
    window.db = db;
  </script>

  <script type="module" src="app.js"></script>
</body>
</html>
